<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuebraCLOB - Gerador de SQL Oracle para XMLs grandes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>QuebraCLOB</h1>
            <p class="subtitle">Gerador de SQL Oracle para XMLs grandes (CLOB)</p>
        </header>

        <main>
            <section class="input-section">
                <div class="section-label">Conexao</div>
                <div class="form-row three-cols">
                    <div class="form-group">
                        <label for="globalUsuario">Usuario</label>
                        <input type="text" id="globalUsuario" placeholder="Ex: &amp;usuario">
                    </div>
                    <div class="form-group">
                        <label for="globalSenha">Senha</label>
                        <input type="text" id="globalSenha" placeholder="Ex: &amp;senha">
                    </div>
                    <div class="form-group">
                        <label for="globalBanco">Banco</label>
                        <input type="text" id="globalBanco" placeholder="Ex: &amp;BANCO">
                    </div>
                </div>

                <div class="separator"></div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo</label>
                        <div class="toggle-group">
                            <button type="button" id="btnTypeFD" class="toggle-btn active">FD</button>
                            <button type="button" id="btnTypeEV" class="toggle-btn">EV</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="chunkSize">Tamanho do chunk</label>
                        <select id="chunkSize">
                            <option value="2000">2.000 caracteres</option>
                            <option value="3000">3.000 caracteres</option>
                            <option value="4000" selected>4.000 caracteres (max Oracle)</option>
                        </select>
                    </div>
                </div>

                <!-- Campos FD -->
                <div id="fdFields">
                    <div id="fdSlots"></div>
                    <button type="button" id="btnAddFdSlot" class="btn-secondary">+ Adicionar conjunto FD</button>
                </div>

                <!-- Campos EV -->
                <div id="evFields" class="hidden">
                    <div id="evSlots"></div>
                    <button type="button" id="btnAddEvSlot" class="btn-secondary">+ Adicionar XML</button>
                </div>

                <input type="file" id="fileInput" accept=".xml,.txt" hidden>

                <button id="btnGenerate" type="button" class="btn-primary">Gerar SQL</button>
            </section>

            <div id="outputContainer"></div>
        </main>

        <footer>
            <p>QuebraCLOB &mdash; Quebra XMLs grandes em comandos SQL Oracle compativeis com CLOB</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
