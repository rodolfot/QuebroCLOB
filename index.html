<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuebraCLOB - Gerador de SQL Oracle para XMLs grandes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>QuebraCLOB</h1>
            <p class="subtitle">Gerador de SQL Oracle para XMLs grandes (CLOB)</p>
        </header>

        <main>
            <section class="input-section">
                <div class="form-group">
                    <label for="xmlInput">XML de entrada</label>
                    <div class="xml-actions">
                        <button id="btnLoadFile" type="button">Carregar arquivo</button>
                        <input type="file" id="fileInput" accept=".xml,.txt" hidden>
                        <button id="btnClearXml" type="button">Limpar</button>
                        <span id="charCount" class="char-count">0 caracteres</span>
                    </div>
                    <textarea id="xmlInput" rows="12" placeholder="Cole o XML aqui ou carregue um arquivo..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tableName">Nome da tabela</label>
                        <input type="text" id="tableName" placeholder="Ex: TB_DOCUMENTO">
                    </div>
                    <div class="form-group">
                        <label for="operationType">Operacao</label>
                        <select id="operationType">
                            <option value="INSERT">INSERT</option>
                            <option value="UPDATE">UPDATE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="chunkSize">Tamanho do chunk</label>
                        <select id="chunkSize">
                            <option value="2000">2.000 caracteres</option>
                            <option value="3000">3.000 caracteres</option>
                            <option value="4000" selected>4.000 caracteres (max Oracle)</option>
                        </select>
                    </div>
                </div>

                <div id="updateFields" class="form-group hidden">
                    <label for="whereClause">Clausula WHERE (sem a palavra WHERE)</label>
                    <input type="text" id="whereClause" placeholder="Ex: id = 12345">
                </div>

                <div id="insertFields" class="form-group">
                    <label for="extraColumns">Colunas adicionais no INSERT (opcional)</label>
                    <textarea id="extraColumns" rows="3" placeholder="Uma por linha no formato: nome_coluna = valor&#10;Ex:&#10;id_documento = 123&#10;dt_criacao = SYSDATE&#10;nm_usuario = 'SISTEMA'"></textarea>
                </div>

                <button id="btnGenerate" type="button" class="btn-primary">Gerar SQL</button>
            </section>

            <section id="outputSection" class="output-section hidden">
                <div class="output-header">
                    <h2>SQL Gerado</h2>
                    <div class="output-actions">
                        <span id="sqlInfo" class="sql-info"></span>
                        <button id="btnCopy" type="button">Copiar SQL</button>
                        <button id="btnDownload" type="button">Baixar .sql</button>
                    </div>
                </div>
                <pre id="sqlOutput"><code></code></pre>
            </section>
        </main>

        <footer>
            <p>QuebraCLOB &mdash; Quebra XMLs grandes em comandos SQL Oracle compativeis com CLOB</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
